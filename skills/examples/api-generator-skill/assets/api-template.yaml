openapi: "3.0.3"
info:
  title: Sample API Template
  description: |
    API Generator Skill에서 참조하는 OpenAPI 템플릿 파일입니다.
    이 템플릿을 기반으로 컨트롤러, 서비스, DTO, 테스트 코드를 자동 생성합니다.
  version: "1.0.0"
  contact:
    name: API Generator Skill

servers:
  - url: http://localhost:3000/api/v1
    description: 로컬 개발 서버

tags:
  - name: Users
    description: 사용자 관리 API
  - name: Products
    description: 상품 관리 API

paths:
  /users:
    get:
      tags:
        - Users
      summary: 사용자 목록 조회
      description: 전체 사용자 목록을 페이지네이션으로 조회합니다.
      operationId: getUsers
      parameters:
        - name: page
          in: query
          description: 페이지 번호 (1부터 시작)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: 페이지당 항목 수
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
    post:
      tags:
        - Users
      summary: 사용자 생성
      description: 새로운 사용자를 생성합니다.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: 유효성 검증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: 이메일 중복
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{id}:
    get:
      tags:
        - Users
      summary: 사용자 단건 조회
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Users
      summary: 사용자 정보 수정
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: 사용자를 찾을 수 없음
    delete:
      tags:
        - Users
      summary: 사용자 삭제
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 삭제 성공
        "404":
          description: 사용자를 찾을 수 없음

  /products:
    get:
      tags:
        - Products
      summary: 상품 목록 조회
      operationId: getProducts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          description: 카테고리별 필터링
          schema:
            type: string
        - name: minPrice
          in: query
          description: 최소 가격
          schema:
            type: number
        - name: maxPrice
          in: query
          description: 최대 가격
          schema:
            type: number
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
    post:
      tags:
        - Products
      summary: 상품 등록
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: 유효성 검증 실패

  /products/{id}:
    get:
      tags:
        - Products
      summary: 상품 단건 조회
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: 상품을 찾을 수 없음
    put:
      tags:
        - Products
      summary: 상품 정보 수정
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: 수정 성공
        "404":
          description: 상품을 찾을 수 없음
    delete:
      tags:
        - Products
      summary: 상품 삭제
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 삭제 성공
        "404":
          description: 상품을 찾을 수 없음

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 사용자 고유 식별자
        email:
          type: string
          format: email
          description: 이메일 주소
        name:
          type: string
          description: 사용자 이름
        role:
          type: string
          enum:
            - admin
            - user
            - guest
          description: 사용자 역할
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role

    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: 이메일 주소
        name:
          type: string
          minLength: 2
          maxLength: 50
          description: 사용자 이름
        password:
          type: string
          minLength: 8
          maxLength: 100
          description: 비밀번호
        role:
          type: string
          enum:
            - admin
            - user
            - guest
          default: user
      required:
        - email
        - name
        - password

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
        role:
          type: string
          enum:
            - admin
            - user
            - guest

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: 상품명
        description:
          type: string
          description: 상품 설명
        price:
          type: number
          format: float
          description: 가격
        category:
          type: string
          description: 카테고리
        stock:
          type: integer
          description: 재고 수량
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - price
        - category
        - stock

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        price:
          type: number
          minimum: 0
        category:
          type: string
        stock:
          type: integer
          minimum: 0
          default: 0
      required:
        - name
        - price
        - category

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        price:
          type: number
          minimum: 0
        category:
          type: string
        stock:
          type: integer
          minimum: 0

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: 현재 페이지
        limit:
          type: integer
          description: 페이지당 항목 수
        totalItems:
          type: integer
          description: 전체 항목 수
        totalPages:
          type: integer
          description: 전체 페이지 수

    Error:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
      required:
        - statusCode
        - message
